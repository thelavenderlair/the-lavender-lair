<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>The Lavender Lair</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@600;700&family=Italianno&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>
        :root {
            --header-dark: #2e164d;
            --header-main: #4c2771;
            --header-light: #7c438d;

            --deep-purple: #40205f;
            --main-purple: #62358a;
            --medium-purple: #8057a3;

            --light-lavender: #eee7f5;
            --page-background: #f5f1f7;
            --sidebar-background: #faf7fc;
            --card-background: #fffdfd;

            --text: #2e1950;
            --muted-text: #71657c;
            --calendar-border: #ded6e3;

            --red: #ba304b;
            --orange: #e4830d;
            --green: #438b5d;
            --teal: #3aaeb0;
            --blue: #537dd6;
            --pink: #d4528e;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Poppins", Arial, sans-serif;
            background: var(--page-background);
            color: var(--text);
        }

        button {
            font-family: inherit;
        }

        /* HEADER */

        .top-header {
            position: relative;
            min-height: 285px;
            padding: 32px 330px 35px 390px;
            overflow: hidden;
            color: white;

            background:
                radial-gradient(
                    circle at 67% 50%,
                    rgba(207, 119, 213, 0.24),
                    transparent 32%
                ),
                linear-gradient(
                    110deg,
                    var(--header-dark),
                    var(--header-main) 54%,
                    var(--header-light)
                );

            box-shadow: 0 10px 26px rgba(44, 23, 67, 0.25);
        }

        .header-content {
            position: relative;
            z-index: 4;
        }

        .top-header h1 {
            margin: 0;
            font-family: "Bodoni Moda", "Times New Roman", serif;
            font-size: clamp(48px, 6vw, 82px);
            line-height: 0.98;
            letter-spacing: -3px;
            font-weight: 600;
            color: #fffaf5;
            white-space: nowrap;
        }

        .top-header h2 {
            margin: 5px 0 0;
            font-family: "Italianno", cursive;
            font-size: clamp(50px, 5vw, 72px);
            line-height: 1;
            font-weight: 400;
            color: #fff3f8;
            text-shadow: 0 0 14px rgba(255, 183, 226, 0.22);
        }

        .top-header p {
            margin: 8px 0 0;
            font-size: 17px;
            color: rgba(255, 255, 255, 0.87);
        }

        /* LOGO */

        .logo-wrap {
            position: absolute;
            z-index: 6;
            top: 0;
            left: 0;

            width: 350px;
            height: 365px;

            display: flex;
            align-items: center;
            justify-content: center;

            background: #fffdfd;
            border-radius: 0 0 55% 0;

            box-shadow:
                12px 12px 28px rgba(45, 24, 65, 0.17);
        }

        .logo-wrap img {
            display: block;
            width: 320px;
            height: 320px;
            object-fit: contain;
        }

        /* HEADER STARS */

        .header-star {
            position: absolute;
            z-index: 2;
            color: #f5d5ed;
            pointer-events: none;
            text-shadow: 0 0 12px rgba(255, 210, 244, 0.4);
        }

        .star-one {
            top: 25px;
            right: 265px;
            font-size: 27px;
        }

        .star-two {
            top: 50px;
            right: 180px;
            font-size: 14px;
        }

        .star-three {
            top: 115px;
            right: 310px;
            font-size: 18px;
        }

        .star-four {
            bottom: 52px;
            right: 355px;
            font-size: 23px;
        }

        .star-five {
            top: 30px;
            left: 68%;
            font-size: 13px;
        }

        /* WISPY FOLIAGE */

        .whisp {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            opacity: 0.38;
        }

        .whisp-right {
            right: 18px;
            bottom: 2px;
            width: 290px;
            height: 180px;
        }

        .whisp-left {
            right: 235px;
            bottom: -20px;
            width: 220px;
            height: 135px;
            opacity: 0.2;
            transform: scaleX(-1);
        }

        .whisp-stem {
            fill: none;
            stroke: #ddb9d8;
            stroke-width: 4;
            stroke-linecap: round;
        }

        .whisp-leaf {
            fill: #ddb9d8;
        }

        /* DOOR */

        .header-door {
            position: absolute;
            right: 72px;
            bottom: -2px;
            z-index: 3;

            width: 145px;
            height: 215px;

            border: 12px solid rgba(224, 188, 224, 0.63);
            border-bottom: none;
            border-radius: 82px 82px 0 0;

            background:
                radial-gradient(
                    circle at 50% 61%,
                    rgba(255, 255, 255, 0.95),
                    transparent 7%
                ),
                radial-gradient(
                    circle at 42% 42%,
                    rgba(255, 255, 255, 0.7),
                    transparent 4%
                ),
                linear-gradient(
                    180deg,
                    #3f1d64,
                    #7e3b91 55%,
                    #d48cd2
                );

            box-shadow:
                0 0 35px rgba(237, 160, 232, 0.35),
                inset 0 0 35px rgba(255, 255, 255, 0.12);
        }

        .header-door::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255, 255, 255, 0.18);
        }

        .header-door::after {
            content: "";
            position: absolute;
            right: 20px;
            top: 112px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d7b068;
            box-shadow: 0 0 8px rgba(255, 222, 149, 0.65);
        }

        /* LAYOUT */

        .layout {
            display: grid;
            grid-template-columns: 330px minmax(0, 1fr);
            min-height: calc(100vh - 285px);
        }

        /* SIDEBAR */

        .sidebar {
            padding: 100px 24px 30px;

            background:
                linear-gradient(
                    180deg,
                    #faf7fc,
                    #f0e8f5
                );

            border-right: 1px solid rgba(77, 39, 111, 0.12);

            box-shadow:
                7px 0 20px rgba(55, 32, 70, 0.06);
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 17px;

            width: 100%;
            min-height: 55px;

            padding: 11px 16px;

            border: none;
            border-radius: 13px;

            background: transparent;
            color: var(--text);

            font-size: 16px;
            font-weight: 500;
            text-align: left;

            cursor: pointer;

            transition:
                transform 0.18s ease,
                background 0.18s ease,
                color 0.18s ease;
        }

        .menu-item:hover {
            background: rgba(98, 53, 138, 0.09);
            transform: translateX(2px);
        }

        .menu-item.active {
            background:
                linear-gradient(
                    100deg,
                    #4f2874,
                    #693c90
                );

            color: white;

            box-shadow:
                0 8px 18px rgba(75, 35, 107, 0.23);
        }

        .menu-icon {
            width: 34px;
            flex-shrink: 0;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 24px;
        }

        .dashboard-icon {
            color: #7651a5;
        }

        .calendar-icon {
            color: var(--blue);
        }

        .orders-icon {
            color: #f06424;
        }

        .customers-icon {
            color: var(--pink);
        }

        .inventory-icon {
            color: var(--teal);
        }

        .invoices-icon {
            color: #d99116;
        }

        .payments-icon {
            color: var(--green);
        }

        .files-icon {
            color: #587bd1;
        }

        .designs-icon {
            color: #c54688;
        }

        .settings-icon {
            color: #8057aa;
        }

        .signout-icon {
            color: #7355a2;
        }

        .menu-item.active .menu-icon {
            color: white;
        }

        .menu-divider {
            height: 1px;
            margin: 11px 12px;
            background: #ddd1e3;
        }

        /* MAIN */

        .main {
            min-width: 0;
            padding: 24px 28px 42px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 365px;
            gap: 22px;
            align-items: start;
        }

        .calendar,
        .side-card,
        .summary-card {
            background: var(--card-background);
            border: 1px solid rgba(79, 40, 111, 0.11);

            box-shadow:
                0 12px 28px rgba(62, 35, 77, 0.11);
        }

        /* CALENDAR */

        .calendar {
            overflow: hidden;
            border-radius: 18px;
        }

        .calendar-toolbar {
            display: grid;
            grid-template-columns: 52px 1fr 52px;
            align-items: center;
            gap: 14px;
            padding: 18px 20px 7px;
        }

        .calendar-title {
            font-family: "Bodoni Moda", serif;
            color: var(--deep-purple);
            font-size: 31px;
            font-weight: 700;
            text-align: center;
        }

        .month-button {
            width: 48px;
            height: 48px;

            border: none;
            border-radius: 11px;

            background: #eadcf3;
            color: var(--deep-purple);

            font-size: 26px;
            cursor: pointer;

            box-shadow:
                0 5px 11px rgba(77, 39, 111, 0.12);
        }

        .month-button:hover {
            background: #dbc2eb;
        }

        .calendar-legend {
            display: flex;
            justify-content: center;
            gap: 27px;

            padding: 3px 15px 16px;

            color: var(--text);
            font-size: 13px;
        }

        .legend-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            margin-right: 7px;
            border-radius: 50%;
        }

        .due-dot {
            background: var(--main-purple);
        }

        .payment-dot {
            background: var(--red);
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));

            border-top: 1px solid var(--calendar-border);
            border-left: 1px solid var(--calendar-border);
        }

        .day-name,
        .day {
            border-right: 1px solid var(--calendar-border);
            border-bottom: 1px solid var(--calendar-border);
        }

        .day-name {
            padding: 11px 5px;

            background:
                linear-gradient(
                    90deg,
                    #4e2875,
                    #693991
                );

            color: white;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        .day {
            min-height: 87px;
            padding: 10px;
            position: relative;
            background: white;
        }

        .day.other-month {
            background: #faf7fb;
            color: #beb4c4;
        }

        .day-number {
            font-size: 15px;
            font-weight: 600;
        }

        .day.today .day-number {
            width: 45px;
            height: 45px;

            display: flex;
            align-items: center;
            justify-content: center;

            margin: -3px auto 0;

            border-radius: 50%;

            background: #e8d6ef;
            color: var(--deep-purple);
        }

        /* RIGHT PANEL */

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .side-card {
            padding: 20px;
            border-radius: 18px;
        }

        .side-card h3 {
            margin: 0 0 14px;

            font-family: "Bodoni Moda", serif;
            color: var(--deep-purple);

            font-size: 24px;
        }

        .quick-action {
            width: 100%;
            min-height: 54px;

            display: flex;
            align-items: center;
            gap: 12px;

            margin-bottom: 7px;
            padding: 8px 13px;

            border: none;
            border-radius: 11px;

            background:
                linear-gradient(
                    100deg,
                    #542a79,
                    #693c90
                );

            color: white;

            font-size: 15px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
        }

        .quick-action:hover {
            background:
                linear-gradient(
                    100deg,
                    #41205f,
                    #572d7b
                );
        }

        .action-icon {
            width: 38px;
            height: 38px;

            display: flex;
            align-items: center;
            justify-content: center;

            flex-shrink: 0;
            border-radius: 50%;

            color: white;
            font-size: 17px;
        }

        .action-order {
            background: #8f66be;
        }

        .action-customer {
            background: #da5a96;
        }

        .action-inventory {
            background: #43b3af;
        }

        .action-upload {
            background: #7588df;
        }

        .upcoming-content {
            display: grid;
            grid-template-columns: 62px 1fr;
            gap: 10px;
            align-items: center;
        }

        .upcoming-icon {
            color: #b483c5;
            font-size: 42px;
            text-align: center;
        }

        .side-card p {
            margin: 0;
            color: var(--text);
            font-size: 14px;
            line-height: 1.55;
        }

        .view-orders {
            width: 100%;
            margin-top: 16px;
            padding: 11px 13px;

            border: 2px solid var(--main-purple);
            border-radius: 10px;

            background: transparent;
            color: var(--main-purple);

            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .view-orders:hover {
            background: var(--light-lavender);
        }

        /* SUMMARY */

        .summary {
            grid-column: 1 / -1;

            display: grid;
            grid-template-columns: repeat(4, minmax(240px, 1fr));
            gap: 18px;

            width: 100%;
            overflow-x: auto;

            padding-bottom: 4px;
        }

        .summary-card {
            min-width: 240px;
            min-height: 145px;

            display: grid;
            grid-template-columns: 68px minmax(0, 1fr);
            align-items: center;
            gap: 18px;

            padding: 18px 20px;

            border-radius: 15px;
        }

        .summary-icon {
            width: 58px;
            height: 58px;

            display: flex;
            align-items: center;
            justify-content: center;

            flex-shrink: 0;
            border-radius: 50%;

            color: white;
            font-size: 28px;
        }

        .summary-text {
            min-width: 0;
        }

        .summary-card h4 {
            margin: 0;
            color: var(--text);
            font-size: 14px;
            line-height: 1.35;
            font-weight: 500;
        }

        .summary-number {
            margin: 4px 0 0;
            color: var(--deep-purple);
            font-size: 34px;
            line-height: 1;
            font-weight: 500;
        }

        .summary-label {
            margin-top: 7px;
            color: var(--text);
            font-size: 13px;
            white-space: nowrap;
        }

        .waiting-payment {
            border-left: 5px solid var(--red);
        }

        .waiting-payment .summary-icon {
            background: var(--red);
        }

        .waiting-approval {
            border-left: 5px solid var(--orange);
        }

        .waiting-approval .summary-icon {
            background: var(--orange);
        }

        .in-progress {
            border-left: 5px solid var(--main-purple);
        }

        .in-progress .summary-icon {
            background: var(--main-purple);
        }

        .ready {
            border-left: 5px solid var(--green);
        }

        .ready .summary-icon {
            background: var(--green);
        }

        /* RESPONSIVE */

        @media (max-width: 1250px) {
            .top-header {
                padding-right: 245px;
            }

            .header-door {
                right: 45px;
                width: 125px;
                height: 190px;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .right-panel {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 900px) {
            .top-header {
                min-height: 230px;
                padding: 30px 25px 30px 280px;
            }

            .logo-wrap {
                width: 260px;
                height: 300px;
            }

            .logo-wrap img {
                width: 245px;
                height: 245px;
            }

            .header-door,
            .whisp {
                display: none;
            }

            .layout {
                grid-template-columns: 255px minmax(0, 1fr);
            }

            .sidebar {
                padding-left: 15px;
                padding-right: 15px;
            }

            .summary {
                grid-template-columns: repeat(2, minmax(240px, 1fr));
            }
        }

        @media (max-width: 720px) {
            .top-header {
                min-height: auto;
                padding: 245px 22px 27px;
                text-align: center;
            }

            .logo-wrap {
                width: 100%;
                height: 230px;
                border-radius: 0 0 35px 35px;
            }

            .logo-wrap img {
                width: 215px;
                height: 215px;
            }

            .top-header h1 {
                font-size: 45px;
                letter-spacing: -2px;
                white-space: normal;
            }

            .top-header h2 {
                font-size: 50px;
            }

            .layout {
                display: block;
            }

            .sidebar {
                padding: 16px;
            }

            .menu {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .menu-item {
                min-height: 49px;
                font-size: 13px;
            }

            .main {
                padding: 16px 10px 32px;
            }

            .right-panel,
            .summary {
                grid-template-columns: 1fr;
            }

            .calendar-toolbar {
                grid-template-columns: 42px 1fr 42px;
            }

            .month-button {
                width: 40px;
                height: 40px;
            }

            .calendar-title {
                font-size: 24px;
            }

            .day {
                min-height: 65px;
                padding: 7px;
            }

            .day-name {
                font-size: 11px;
            }
        }
    </style>
</head>

<body>

    <header class="top-header">

        <div class="logo-wrap">
            <img
                src="./logowhite.png"
                alt="The Lavender Lair logo"
            >
        </div>

        <div class="header-content">
            <h1>The Lavender Lair</h1>

            <h2>Good Morning, Tasha!</h2>

            <p>
                Here is what needs your attention today.
            </p>
        </div>

        <span class="header-star star-one">✦</span>
        <span class="header-star star-two">✧</span>
        <span class="header-star star-three">✦</span>
        <span class="header-star star-four">✧</span>
        <span class="header-star star-five">✦</span>

        <svg
            class="whisp whisp-right"
            viewBox="0 0 300 180"
            aria-hidden="true"
        >
            <path
                class="whisp-stem"
                d="M20 165 C85 132, 135 103, 186 46"
            />

            <path
                class="whisp-stem"
                d="M94 133 C136 139, 192 120, 260 72"
            />

            <ellipse
                class="whisp-leaf"
                cx="70"
                cy="139"
                rx="18"
                ry="8"
                transform="rotate(-30 70 139)"
            />

            <ellipse
                class="whisp-leaf"
                cx="112"
                cy="116"
                rx="20"
                ry="8"
                transform="rotate(-35 112 116)"
            />

            <ellipse
                class="whisp-leaf"
                cx="148"
                cy="87"
                rx="20"
                ry="8"
                transform="rotate(-48 148 87)"
            />

            <ellipse
                class="whisp-leaf"
                cx="178"
                cy="54"
                rx="18"
                ry="8"
                transform="rotate(-55 178 54)"
            />

            <ellipse
                class="whisp-leaf"
                cx="136"
                cy="137"
                rx="18"
                ry="8"
                transform="rotate(12 136 137)"
            />

            <ellipse
                class="whisp-leaf"
                cx="180"
                cy="123"
                rx="20"
                ry="8"
                transform="rotate(-12 180 123)"
            />

            <ellipse
                class="whisp-leaf"
                cx="223"
                cy="95"
                rx="20"
                ry="8"
                transform="rotate(-25 223 95)"
            />
        </svg>

        <svg
            class="whisp whisp-left"
            viewBox="0 0 300 180"
            aria-hidden="true"
        >
            <path
                class="whisp-stem"
                d="M20 165 C85 132, 135 103, 186 46"
            />

            <ellipse
                class="whisp-leaf"
                cx="70"
                cy="139"
                rx="18"
                ry="8"
                transform="rotate(-30 70 139)"
            />

            <ellipse
                class="whisp-leaf"
                cx="112"
                cy="116"
                rx="20"
                ry="8"
                transform="rotate(-35 112 116)"
            />

            <ellipse
                class="whisp-leaf"
                cx="148"
                cy="87"
                rx="20"
                ry="8"
                transform="rotate(-48 148 87)"
            />

            <ellipse
                class="whisp-leaf"
                cx="178"
                cy="54"
                rx="18"
                ry="8"
                transform="rotate(-55 178 54)"
            />
        </svg>

        <div class="header-door"></div>

    </header>

    <div class="layout">

        <aside class="sidebar">

            <nav class="menu">

                <button class="menu-item active">
                    <span class="menu-icon dashboard-icon">
                        <i class="fa-solid fa-house"></i>
                    </span>

                    <span>Dashboard</span>
                </button>

                <button class="menu-item">
                    <span class="menu-icon calendar-icon">
                        <i class="fa-regular fa-calendar-days"></i>
                    </span>

                    <span>Calendar</span>
                </button>

                <button class="menu-item">
                    <span class="menu-icon orders-icon">
                        <i class="fa-regular fa-clipboard"></i>
                    </span>

                    <span>Orders</span>
                </button>

                <button class="menu-item">
                    <span class="menu-icon customers-icon">
                        <i class="fa-solid fa-user"></i>
                    </span>

                    <span>Customers</span>
                </button>

                <button class="menu-item">
                    <span class="menu-icon inventory-icon">
                        <i class="fa-solid fa-cube"></i>
                    </span>

                    <span>Inventory</span>
                </button>

                <button class="menu-item">
                    <span class="menu-icon invoices-icon">

    <script>
        const calendarTitle =
            document.getElementById("calendarTitle");

        const calendarDays =
            document.getElementById("calendarDays");

        const previousMonthButton =
            document.getElementById("previousMonth");

        const nextMonthButton =
            document.getElementById("nextMonth");

        let displayedDate = new Date();

        displayedDate.setDate(1);

        const weekdays = [
            "Sun",
            "Mon",
            "Tue",
            "Wed",
            "Thu",
            "Fri",
            "Sat"
        ];

        function dateKey(date) {
            return [
                date.getFullYear(),
                String(date.getMonth() + 1).padStart(2, "0"),
                String(date.getDate()).padStart(2, "0")
            ].join("-");
        }

        function renderCalendar() {
            calendarDays.innerHTML = "";

            weekdays.forEach(function (weekday) {
                const weekdayCell =
                    document.createElement("div");

                weekdayCell.className = "day-name";
                weekdayCell.textContent = weekday;

                calendarDays.appendChild(weekdayCell);
            });

            calendarTitle.textContent =
                displayedDate.toLocaleDateString(
                    "en-US",
                    {
                        month: "long",
                        year: "numeric"
                    }
                );

            const year = displayedDate.getFullYear();
            const month = displayedDate.getMonth();

            const firstDayOfMonth =
                new Date(year, month, 1);

            const startingCell =
                new Date(year, month, 1);

            startingCell.setDate(
                1 - firstDayOfMonth.getDay()
            );

            const todayKey = dateKey(new Date());

            for (
                let cellNumber = 0;
                cellNumber < 42;
                cellNumber += 1
            ) {
                const cellDate =
                    new Date(startingCell);

                cellDate.setDate(
                    startingCell.getDate() + cellNumber
                );

                const dayCell =
                    document.createElement("div");

                dayCell.className = "day";

                if (cellDate.getMonth() !== month) {
                    dayCell.classList.add("other-month");
                }

                if (dateKey(cellDate) === todayKey) {
                    dayCell.classList.add("today");
                }

                const dayNumber =
                    document.createElement("div");

                dayNumber.className = "day-number";
                dayNumber.textContent =
                    cellDate.getDate();

                dayCell.appendChild(dayNumber);
                calendarDays.appendChild(dayCell);
            }
        }

        previousMonthButton.addEventListener(
            "click",
            function () {
                displayedDate.setMonth(
                    displayedDate.getMonth() - 1
                );

                renderCalendar();
            }
        );

        nextMonthButton.addEventListener(
            "click",
            function () {
                displayedDate.setMonth(
                    displayedDate.getMonth() + 1
                );

                renderCalendar();
            }
        );

        renderCalendar();
    </script>
