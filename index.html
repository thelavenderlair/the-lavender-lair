<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lavender Lair Dashboard</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f6f1f8;
    color: #281060;
  }
  button, input, select, textarea { font: inherit; }
  button { cursor: pointer; }

  .page-shell {
    width: 100%;
    overflow-x: auto;
    background: #f6f1f8;
  }

  .dashboard-stage {
    position: relative;
    width: min(100vw, 1536px);
    min-width: 1100px;
    aspect-ratio: 1536 / 1024;
    margin: 0 auto;
    background: url("./dashboard-clean.png") top left / 100% 100% no-repeat;
    box-shadow: 0 8px 35px rgba(48, 22, 86, .14);
  }

  /* Clickable menu areas */
  .hotspot {
    position: absolute;
    border: 0;
    background: transparent;
    border-radius: 12px;
    z-index: 10;
  }
  .hotspot:hover { outline: none; }

  .nav-hotspot {
    left: 1.2%;
    width: 18.5%;
    height: 5.1%;
    overflow: hidden;
  }

  .nav-hotspot.active-nav {
    background: linear-gradient(135deg, #35126f, #54218f);
    box-shadow: 0 6px 14px rgba(52, 19, 105, .22);
  }

  .nav-hotspot.active-nav::after {
    content: attr(data-label);
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    padding-left: 23%;
    color: #fff;
    font-size: clamp(15px, 1.35vw, 21px);
    font-weight: 700;
    text-align: left;
  }
  .nav-dashboard { top: 34.3%; }
  .nav-calendar { top: 40.1%; }
  .nav-orders { top: 45.8%; }
  .nav-customers { top: 51.4%; }
  .nav-inventory { top: 57%; }
  .nav-invoices { top: 62.7%; }
  .nav-payments { top: 68.4%; }
  .nav-files { top: 74.1%; }
  .nav-designs { top: 79.7%; }
  .nav-settings { top: 85.4%; }
  .nav-signout { top: 91.4%; }

  .quick-hotspot { left: 75.35%; width: 21.25%; height: 5.7%; }
  .quick-order { top: 35.6%; }
  .quick-customer { top: 41.7%; }
  .quick-inventory { top: 47.6%; }
  .quick-file { top: 53.6%; }
  .view-orders { left: 75.55%; top: 76.8%; width: 21.2%; height: 4.8%; }

  /* Live calendar overlay */
  .calendar-live {
    position: absolute;
    left: 23.95%;
    top: 30.8%;
    width: 47.05%;
    height: 50.7%;
    z-index: 5;
    background: transparent;
    border-radius: 16px;
    padding: 1.3% 1.2% 1.2%;
    box-shadow: none;
  }

  .calendar-top {
    display: grid;
    grid-template-columns: 9% 1fr 9%;
    align-items: center;
    gap: 1%;
  }

  .month-arrow {
    height: 54px;
    border: 0;
    border-radius: 10px;
    color: #3b187b;
    background: #eadff2;
    font-size: 37px;
    line-height: 1;
  }

  .month-heading {
    margin: 0;
    text-align: center;
    font-family: Georgia, serif;
    font-size: clamp(22px, 2.25vw, 38px);
    line-height: 1;
    white-space: nowrap;
    color: #2d0d70;
  }

  .calendar-legend {
    display: flex;
    justify-content: center;
    gap: 5%;
    margin: 1% 0 2%;
    font-size: clamp(12px, 1.2vw, 18px);
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
  }

  .dot.order { background: #7640b7; }
  .dot.payment { background: #c9183e; }

  .calendar-box {
    overflow: hidden;
    border: 1px solid #ded8e6;
    border-radius: 11px;
  }

  .weekdays, .days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .weekdays {
    background: linear-gradient(90deg, #351270, #552492, #351270);
    color: #fff;
  }

  .weekdays div {
    padding: 9px 2px;
    text-align: center;
    font-size: clamp(12px, 1.15vw, 18px);
  }

  .day {
    position: relative;
    min-height: clamp(46px, 6.2vh, 67px);
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid #e7e2ec;
    border-bottom: 1px solid #e7e2ec;
    background: #fff;
    color: #251061;
    font-size: clamp(14px, 1.25vw, 20px);
    font-weight: 600;
    border-top: 0;
    border-left: 0;
    cursor: pointer;
  }

  button.day:hover:not(.blank) {
    background: #f1e8f7;
  }

  button.day:focus-visible {
    outline: 3px solid #8a58bd;
    outline-offset: -3px;
  }

  .day:nth-child(7n) { border-right: 0; }
  .day.blank { color: transparent; }
  .day.today span {
    width: 48px;
    height: 48px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: #e5d8ed;
  }
  .day.has-order::after {
    content: "";
    position: absolute;
    bottom: 5px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #7640b7;
  }
  .day.has-payment::before {
    content: "";
    position: absolute;
    bottom: 5px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #c9183e;
  }

  .day.has-event span::after {
    content: "";
    position: absolute;
    top: 7px;
    right: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #5c2a96;
    box-shadow: 0 0 0 2px #fff;
  }

  /* Live status values cover the printed sample zeros in dashboard.png */
  .count {
    position: absolute;
    z-index: 9;
    top: 88.6%;
    width: 10.5%;
    height: 8.2%;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding-left: 1.2%;
    color: #2c0d70;
    background: transparent;
    line-height: 1;
  }

  .count strong {
    font-family: Georgia, serif;
    font-size: clamp(30px, 3.2vw, 50px);
    font-weight: 500;
  }

  .count span {
    margin-top: 3px;
    font-size: clamp(12px, 1.05vw, 17px);
  }

  .count-payment { left: 28.9%; }
  .count-approval { left: 47.6%; }
  .count-progress { left: 66.4%; }
  .count-ready { left: 85.2%; width: 9.8%; }

  /* Modal */
  .modal-shade {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(32, 10, 67, .62);
  }
  .modal-shade.open { display: flex; }

  .modal {
    width: min(560px, 100%);
    max-height: 90vh;
    overflow-y: auto;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 24px 60px rgba(24, 5, 55, .32);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    color: #fff;
    background: linear-gradient(135deg, #35136f, #5b2795);
    border-radius: 20px 20px 0 0;
  }

  .modal-header h2 { margin: 0; font-family: Georgia, serif; }
  .close-button {
    border: 0;
    background: transparent;
    color: #fff;
    font-size: 30px;
  }

  .modal-body { padding: 24px; }
  .form-grid { display: grid; gap: 15px; }
  label { display: grid; gap: 6px; font-weight: 700; }
  input, select, textarea {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid #ccbadd;
    border-radius: 9px;
    color: #281060;
    background: #fff;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }

  .secondary, .primary {
    padding: 11px 18px;
    border-radius: 9px;
    font-weight: 700;
  }
  .secondary {
    border: 1px solid #7240ac;
    color: #42177d;
    background: #fff;
  }
  .primary {
    border: 0;
    color: #fff;
    background: #4a1d87;
  }

  /* Pages opened from the left menu */
  .drawer {
    position: fixed;
    z-index: 90;
    top: 0;
    right: 0;
    width: min(760px, 92vw);
    height: 100vh;
    transform: translateX(105%);
    transition: transform .22s ease;
    background: #fbf9fd;
    box-shadow: -16px 0 45px rgba(34, 12, 73, .25);
    overflow-y: auto;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    position: sticky;
    top: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 26px;
    color: #fff;
    background: linear-gradient(135deg, #301064, #5b2795);
  }
  .drawer-header h2 { margin: 0; font-family: Georgia, serif; font-size: 34px; }
  .drawer-content { padding: 25px; }

  .record {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    padding: 15px;
    margin-bottom: 12px;
    border: 1px solid #e1d6eb;
    border-radius: 12px;
    background: #fff;
  }
  .record h3 { margin: 0 0 5px; }
  .record p { margin: 3px 0; }
  .delete {
    align-self: start;
    border: 0;
    border-radius: 8px;
    padding: 8px 10px;
    color: #fff;
    background: #b71d42;
  }

  .empty {
    padding: 30px;
    text-align: center;
    border: 2px dashed #d7c6e6;
    border-radius: 14px;
    background: #fff;
  }


  .drawer-calendar {
    background: #fff;
    border: 1px solid #e1d6eb;
    border-radius: 16px;
    padding: 18px;
  }

  .drawer-calendar .calendar-top {
    grid-template-columns: 64px 1fr 64px;
  }

  .drawer-calendar .month-heading {
    font-size: clamp(25px, 4vw, 38px);
  }

  .drawer-calendar .calendar-legend {
    margin: 12px 0 16px;
    font-size: 16px;
  }

  .drawer-calendar .day {
    min-height: 62px;
    font-size: 18px;
  }

  .drawer-calendar .weekdays div {
    font-size: 16px;
  }

  @media (max-width: 1200px) {
    .dashboard-stage { min-width: 1000px; }
  }

  /* PIN LOCK SCREEN */
  body.locked {
    overflow: hidden;
  }

  .pin-lock {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: grid;
    place-items: center;
    padding: 20px;
    background:
      radial-gradient(circle at 76% 26%, rgba(204, 116, 230, .28), transparent 25%),
      radial-gradient(circle at 18% 85%, rgba(152, 91, 201, .22), transparent 28%),
      linear-gradient(135deg, #24104f, #3b176f 55%, #24104f);
  }

  .pin-lock.hidden {
    display: none;
  }

  .pin-card {
    width: min(430px, 100%);
    padding: 28px;
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 24px;
    background: rgba(255,255,255,.97);
    box-shadow: 0 26px 70px rgba(17, 4, 43, .42);
    text-align: center;
  }

  .pin-logo {
    width: 150px;
    height: 150px;
    margin: -8px auto 8px;
    display: block;
    object-fit: contain;
  }

  .pin-card h1 {
    margin: 0;
    font-family: Georgia, serif;
    font-size: 34px;
    color: #34116f;
  }

  .pin-card p {
    margin: 8px 0 18px;
    color: #65488a;
  }

  .pin-dots {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 18px 0 22px;
  }

  .pin-dot {
    width: 18px;
    height: 18px;
    border: 2px solid #6d39a5;
    border-radius: 50%;
    background: #fff;
  }

  .pin-dot.filled {
    background: #4d1d87;
  }

  .pin-keypad {
    display: grid;
    grid-template-columns: repeat(3, 74px);
    justify-content: center;
    gap: 12px;
  }

  .pin-key {
    width: 74px;
    height: 58px;
    border: 1px solid #d8c7e6;
    border-radius: 14px;
    color: #34116f;
    background: #f8f3fb;
    font-size: 24px;
    font-weight: 700;
  }

  .pin-key:hover {
    background: #eee2f5;
  }

  .pin-key.action {
    font-size: 18px;
  }

  .pin-message {
    min-height: 24px;
    margin-top: 16px;
    color: #a91843;
    font-weight: 700;
  }

  .pin-hint {
    margin-top: 10px;
    font-size: 13px;
    color: #806a9a;
  }

  .lock-again {
    position: fixed;
    z-index: 80;
    right: 18px;
    bottom: 18px;
    width: 48px;
    height: 48px;
    border: 0;
    border-radius: 50%;
    color: #fff;
    background: #4c1c86;
    box-shadow: 0 7px 20px rgba(44, 10, 81, .3);
    font-size: 21px;
  }

</style>
</head>
<body class="locked">

<div class="pin-lock" id="pinLock" aria-label="PIN lock screen">
  <section class="pin-card">
    <img class="pin-logo" src="./logowhite.png" alt="The Lavender Lair logo">
    <h1 id="pinTitle">Enter Your PIN</h1>
    <p id="pinSubtitle">Enter your 4-digit PIN to open the dashboard.</p>

    <div class="pin-dots" aria-hidden="true">
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
    </div>

    <div class="pin-keypad" id="pinKeypad">
      <button type="button" class="pin-key" data-digit="1">1</button>
      <button type="button" class="pin-key" data-digit="2">2</button>
      <button type="button" class="pin-key" data-digit="3">3</button>
      <button type="button" class="pin-key" data-digit="4">4</button>
      <button type="button" class="pin-key" data-digit="5">5</button>
      <button type="button" class="pin-key" data-digit="6">6</button>
      <button type="button" class="pin-key" data-digit="7">7</button>
      <button type="button" class="pin-key" data-digit="8">8</button>
      <button type="button" class="pin-key" data-digit="9">9</button>
      <button type="button" class="pin-key action" id="pinClear">Clear</button>
      <button type="button" class="pin-key" data-digit="0">0</button>
      <button type="button" class="pin-key action" id="pinBack">⌫</button>
    </div>

    <div class="pin-message" id="pinMessage" aria-live="polite"></div>
    <div class="pin-hint" id="pinHint"></div>
  </section>
</div>

<button class="lock-again" id="lockAgain" type="button" aria-label="Lock dashboard" title="Lock dashboard">🔒</button>

<div class="page-shell">
  <main class="dashboard-stage" aria-label="The Lavender Lair dashboard">

    <button class="hotspot nav-hotspot nav-dashboard active-nav" data-label="Dashboard" aria-label="Dashboard" onclick="showDashboard()"></button>
    <button class="hotspot nav-hotspot nav-calendar" data-label="Calendar" aria-label="Calendar" onclick="openDrawer('Calendar')"></button>
    <button class="hotspot nav-hotspot nav-orders" data-label="Orders" aria-label="Orders" onclick="openDrawer('Orders')"></button>
    <button class="hotspot nav-hotspot nav-customers" data-label="Customers" aria-label="Customers" onclick="openDrawer('Customers')"></button>
    <button class="hotspot nav-hotspot nav-inventory" data-label="Inventory" aria-label="Inventory" onclick="openDrawer('Inventory')"></button>
    <button class="hotspot nav-hotspot nav-invoices" data-label="Invoices" aria-label="Invoices" onclick="openDrawer('Invoices')"></button>
    <button class="hotspot nav-hotspot nav-payments" data-label="Payments" aria-label="Payments" onclick="openDrawer('Payments')"></button>
    <button class="hotspot nav-hotspot nav-files" data-label="Files" aria-label="Files" onclick="openDrawer('Files')"></button>
    <button class="hotspot nav-hotspot nav-designs" data-label="Designs" aria-label="Designs" onclick="openDrawer('Designs')"></button>
    <button class="hotspot nav-hotspot nav-settings" data-label="Settings" aria-label="Settings" onclick="openDrawer('Settings')"></button>
    <button class="hotspot nav-hotspot nav-signout" data-label="Sign Out" aria-label="Sign out" onclick="alert('Sign out can be connected when login is added.')"></button>

    <button class="hotspot quick-hotspot quick-order" aria-label="New order" onclick="openModal('order')"></button>
    <button class="hotspot quick-hotspot quick-customer" aria-label="New customer" onclick="openModal('customer')"></button>
    <button class="hotspot quick-hotspot quick-inventory" aria-label="Add inventory" onclick="openModal('inventory')"></button>
    <button class="hotspot quick-hotspot quick-file" aria-label="Upload file" onclick="openModal('file')"></button>
    <button class="hotspot view-orders" aria-label="View all orders" onclick="openDrawer('Orders')"></button>

    <section class="calendar-live" aria-label="Live calendar">
      <div class="calendar-top">
        <button class="month-arrow" id="prevMonth" aria-label="Previous month">‹</button>
        <h2 class="month-heading" id="monthHeading"></h2>
        <button class="month-arrow" id="nextMonth" aria-label="Next month">›</button>
      </div>
      <div class="calendar-legend">
        <span class="legend"><span class="dot order"></span>Order Due</span>
        <span class="legend"><span class="dot payment"></span>Waiting for Payment</span>
      </div>
      <div class="calendar-box">
        <div class="weekdays">
          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div class="days" id="calendarDays"></div>
      </div>
    </section>

    <div class="count count-payment"><strong id="countPayment">0</strong><span>Orders</span></div>
    <div class="count count-approval"><strong id="countApproval">0</strong><span>Orders</span></div>
    <div class="count count-progress"><strong id="countProgress">0</strong><span>Orders</span></div>
    <div class="count count-ready"><strong id="countReady">0</strong><span>Orders</span></div>
  </main>
</div>

<div class="modal-shade" id="modalShade">
  <section class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add</h2>
      <button class="close-button" onclick="closeModal()" aria-label="Close">×</button>
    </div>
    <div class="modal-body">
      <form id="entryForm">
        <div class="form-grid" id="formFields"></div>
        <div class="modal-actions">
          <button type="button" class="secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="primary">Save</button>
        </div>
      </form>
    </div>
  </section>
</div>

<aside class="drawer" id="drawer">
  <div class="drawer-header">
    <h2 id="drawerTitle">Orders</h2>
    <button class="close-button" onclick="closeDrawer()" aria-label="Close">×</button>
  </div>
  <div class="drawer-content" id="drawerContent"></div>
</aside>

<script>
const STORAGE_KEY = "lavenderLairDashboardDataV1";

const defaultData = {
  orders: [],
  customers: [],
  inventory: [],
  files: [],
  events: []
};

let data = loadData();
let displayedDate = new Date();

function loadData() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return saved ? { ...defaultData, ...saved } : structuredClone(defaultData);
  } catch {
    return structuredClone(defaultData);
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  updateDashboard();
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function openModal(type, selectedDate = "") {
  const title = document.getElementById("modalTitle");
  const fields = document.getElementById("formFields");
  const form = document.getElementById("entryForm");
  form.dataset.type = type;

  const forms = {
    order: {
      title: "New Order",
      html: `
        <label>Customer name<input name="customer" required></label>
        <label>Order description<input name="description" required></label>
        <label>Due date<input type="date" name="dueDate" required></label>
        <label>Status
          <select name="status" required>
            <option value="payment">Waiting Payment</option>
            <option value="approval">Waiting Approval</option>
            <option value="progress">In Progress</option>
            <option value="ready">Ready</option>
          </select>
        </label>
        <label>Total<input type="number" min="0" step="0.01" name="total" placeholder="0.00"></label>
      `
    },
    customer: {
      title: "New Customer",
      html: `
        <label>Name<input name="name" required></label>
        <label>Email<input type="email" name="email"></label>
        <label>Phone<input name="phone"></label>
        <label>Notes<textarea name="notes" rows="3"></textarea></label>
      `
    },
    inventory: {
      title: "Add Inventory",
      html: `
        <label>Item name<input name="name" required></label>
        <label>Category
          <select name="category">
            <option>Apparel</option>
            <option>Paper Products</option>
            <option>Stickers</option>
            <option>Add On</option>
            <option>Drinkware</option>
            <option>Houseware</option>
            <option>Other</option>
          </select>
        </label>
        <label>Quantity<input type="number" min="0" name="quantity" value="0" required></label>
        <label>SKU<input name="sku"></label>
      `
    },
    file: {
      title: "Add File Link",
      html: `
        <label>File name<input name="name" required></label>
        <label>Image or file URL<input type="url" name="url" required placeholder="https://"></label>
        <label>Customer or order<input name="related"></label>
      `
    },
    event: {
      title: "Add Calendar Event",
      html: `
        <label>Event title<input name="title" required></label>
        <label>Date<input type="date" name="date" required></label>
        <label>Time<input type="time" name="time"></label>
        <label>Notes<textarea name="notes" rows="3"></textarea></label>
      `
    }
  };

  title.textContent = forms[type].title;
  fields.innerHTML = forms[type].html;
  document.getElementById("modalShade").classList.add("open");

  if (type === "event" && selectedDate) {
    const dateInput = fields.querySelector('input[name="date"]');
    if (dateInput) dateInput.value = selectedDate;
  }
}

function closeModal() {
  document.getElementById("modalShade").classList.remove("open");
  document.getElementById("entryForm").reset();
}

document.getElementById("entryForm").addEventListener("submit", event => {
  event.preventDefault();
  const type = event.currentTarget.dataset.type;
  const values = Object.fromEntries(new FormData(event.currentTarget).entries());
  const item = { id: crypto.randomUUID(), createdAt: new Date().toISOString(), ...values };

  if (type === "order") data.orders.push(item);
  if (type === "customer") data.customers.push(item);
  if (type === "inventory") data.inventory.push(item);
  if (type === "file") data.files.push(item);
  if (type === "event") data.events.push(item);

  saveData();
  closeModal();
  if (type === "order") openDrawer("Orders");
  if (type === "event") openDrawer("Calendar");
});

function deleteItem(collection, id) {
  data[collection] = data[collection].filter(item => item.id !== id);
  saveData();
  openDrawer(collection === "events"
    ? "Calendar"
    : collection[0].toUpperCase() + collection.slice(1));
}

function setActiveNav(label) {
  document.querySelectorAll(".nav-hotspot").forEach(button => {
    button.classList.toggle("active-nav", button.dataset.label === label);
  });
}

function showDashboard() {
  closeDrawer();
  setActiveNav("Dashboard");
}

function openDrawer(section) {
  setActiveNav(section);
  document.getElementById("drawerTitle").textContent = section;
  document.getElementById("drawerContent").innerHTML = renderSection(section);
  document.getElementById("drawer").classList.add("open");

  if (section === "Calendar") {
    document.getElementById("drawerPrevMonth").addEventListener("click", () => {
      displayedDate = new Date(
        displayedDate.getFullYear(),
        displayedDate.getMonth() - 1,
        1
      );
      renderCalendar();
    });

    document.getElementById("drawerNextMonth").addEventListener("click", () => {
      displayedDate = new Date(
        displayedDate.getFullYear(),
        displayedDate.getMonth() + 1,
        1
      );
      renderCalendar();
    });

    renderDrawerCalendar();
  }
}

function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
}

function renderSection(section) {
  const key = section.toLowerCase();

  if (key === "orders") {
    if (!data.orders.length) return `<div class="empty">No orders yet. Click “+ New Order” on the dashboard.</div>`;
    return data.orders.map(order => `
      <article class="record">
        <div>
          <h3>${escapeHtml(order.customer)}</h3>
          <p>${escapeHtml(order.description)}</p>
          <p><strong>Due:</strong> ${escapeHtml(order.dueDate)}</p>
          <p><strong>Status:</strong> ${statusLabel(order.status)}</p>
          <p><strong>Total:</strong> $${Number(order.total || 0).toFixed(2)}</p>
        </div>
        <button class="delete" onclick="deleteItem('orders','${order.id}')">Delete</button>
      </article>
    `).join("");
  }

  if (key === "customers") {
    if (!data.customers.length) return `<div class="empty">No customers yet.</div>`;
    return data.customers.map(customer => `
      <article class="record">
        <div>
          <h3>${escapeHtml(customer.name)}</h3>
          <p>${escapeHtml(customer.email)}</p>
          <p>${escapeHtml(customer.phone)}</p>
          <p>${escapeHtml(customer.notes)}</p>
        </div>
        <button class="delete" onclick="deleteItem('customers','${customer.id}')">Delete</button>
      </article>
    `).join("");
  }

  if (key === "inventory") {
    if (!data.inventory.length) return `<div class="empty">No inventory yet.</div>`;
    return data.inventory.map(item => `
      <article class="record">
        <div>
          <h3>${escapeHtml(item.name)}</h3>
          <p><strong>Category:</strong> ${escapeHtml(item.category)}</p>
          <p><strong>Quantity:</strong> ${escapeHtml(item.quantity)}</p>
          <p><strong>SKU:</strong> ${escapeHtml(item.sku)}</p>
        </div>
        <button class="delete" onclick="deleteItem('inventory','${item.id}')">Delete</button>
      </article>
    `).join("");
  }

  if (key === "files") {
    if (!data.files.length) return `<div class="empty">No file links yet.</div>`;
    return data.files.map(file => `
      <article class="record">
        <div>
          <h3>${escapeHtml(file.name)}</h3>
          <p>${escapeHtml(file.related)}</p>
          <p><a href="${escapeHtml(file.url)}" target="_blank" rel="noopener">Open file</a></p>
        </div>
        <button class="delete" onclick="deleteItem('files','${file.id}')">Delete</button>
      </article>
    `).join("");
  }

  if (key === "calendar") {
    const eventList = data.events.length
      ? data.events
          .slice()
          .sort((a, b) => `${a.date} ${a.time || ""}`.localeCompare(`${b.date} ${b.time || ""}`))
          .map(event => `
            <article class="record">
              <div>
                <h3>${escapeHtml(event.title)}</h3>
                <p><strong>Date:</strong> ${escapeHtml(event.date)}</p>
                <p><strong>Time:</strong> ${escapeHtml(event.time || "No time set")}</p>
                <p>${escapeHtml(event.notes || "")}</p>
              </div>
              <button class="delete" onclick="deleteItem('events','${event.id}')">Delete</button>
            </article>
          `).join("")
      : `<div class="empty">No calendar events yet. Click any date to add one.</div>`;

    return `
      <section class="drawer-calendar" aria-label="Full calendar">
        <div class="calendar-top">
          <button class="month-arrow" id="drawerPrevMonth" aria-label="Previous month">‹</button>
          <h3 class="month-heading" id="drawerMonthHeading"></h3>
          <button class="month-arrow" id="drawerNextMonth" aria-label="Next month">›</button>
        </div>

        <div class="calendar-legend">
          <span class="legend"><span class="dot order"></span>Order Due</span>
          <span class="legend"><span class="dot payment"></span>Waiting for Payment</span>
          <span class="legend"><span class="dot" style="background:#5c2a96"></span>Event</span>
        </div>

        <div class="calendar-box">
          <div class="weekdays">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
            <div>Thu</div><div>Fri</div><div>Sat</div>
          </div>
          <div class="days" id="drawerCalendarDays"></div>
        </div>

        <div style="margin-top:20px">
          <h3 style="font-family:Georgia,serif;color:#32166d">Calendar Events</h3>
          ${eventList}
        </div>
      </section>
    `;
  }

  return `<div class="empty">${escapeHtml(section)} is ready for us to build next.</div>`;
}

function statusLabel(status) {
  return {
    payment: "Waiting Payment",
    approval: "Waiting Approval",
    progress: "In Progress",
    ready: "Ready"
  }[status] || status;
}

function updateDashboard() {
  const counts = { payment: 0, approval: 0, progress: 0, ready: 0 };
  data.orders.forEach(order => {
    if (counts[order.status] !== undefined) counts[order.status]++;
  });

  document.getElementById("countPayment").textContent = counts.payment;
  document.getElementById("countApproval").textContent = counts.approval;
  document.getElementById("countProgress").textContent = counts.progress;
  document.getElementById("countReady").textContent = counts.ready;
  renderCalendar();
}

function fillCalendarGrid(daysElement, year, month) {
  daysElement.innerHTML = "";

  const firstDay = new Date(year, month, 1).getDay();
  const count = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < firstDay; i++) {
    const blank = document.createElement("div");
    blank.className = "day blank";
    blank.textContent = ".";
    daysElement.appendChild(blank);
  }

  for (let day = 1; day <= count; day++) {
    const cell = document.createElement("button");
    const span = document.createElement("span");
    span.textContent = day;
    cell.type = "button";
    cell.className = "day";

    const key = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    const orders = data.orders.filter(order => order.dueDate === key);

    cell.setAttribute("aria-label", `Add event for ${key}`);
    cell.title = "Click to add an event for this date";
    cell.addEventListener("click", () => openModal("event", key));

    if (orders.length) cell.classList.add("has-order");
    if (orders.some(order => order.status === "payment")) {
      cell.classList.add("has-payment");
    }

    if (
      day === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear()
    ) {
      cell.classList.add("today");
    }

    cell.appendChild(span);
    daysElement.appendChild(cell);
  }

  const total = firstDay + count;
  const target = total <= 35 ? 35 : 42;

  for (let i = total; i < target; i++) {
    const blank = document.createElement("div");
    blank.className = "day blank";
    blank.textContent = ".";
    daysElement.appendChild(blank);
  }
}

function renderDrawerCalendar() {
  const heading = document.getElementById("drawerMonthHeading");
  const days = document.getElementById("drawerCalendarDays");

  if (!heading || !days) return;

  const year = displayedDate.getFullYear();
  const month = displayedDate.getMonth();
  const monthName = displayedDate.toLocaleString("en-US", { month: "long" });

  heading.textContent = `✦  ${monthName} ${year}  ✦`;
  fillCalendarGrid(days, year, month);
}

function renderCalendar() {
  const year = displayedDate.getFullYear();
  const month = displayedDate.getMonth();
  const heading = document.getElementById("monthHeading");
  const days = document.getElementById("calendarDays");
  const monthName = displayedDate.toLocaleString("en-US", { month: "long" });

  heading.textContent = `✦  ${monthName} ${year}  ✦`;
  fillCalendarGrid(days, year, month);
  renderDrawerCalendar();
}

document.getElementById("prevMonth").addEventListener("click", () => {
  displayedDate = new Date(displayedDate.getFullYear(), displayedDate.getMonth() - 1, 1);
  renderCalendar();
});

document.getElementById("nextMonth").addEventListener("click", () => {
  displayedDate = new Date(displayedDate.getFullYear(), displayedDate.getMonth() + 1, 1);
  renderCalendar();
});

document.getElementById("modalShade").addEventListener("click", event => {
  if (event.target.id === "modalShade") closeModal();
});


const PIN_HASH_KEY = "lavenderLairPinHashV1";
const PIN_UNLOCKED_KEY = "lavenderLairUnlockedThisSession";
const PIN_LOCKOUT_KEY = "lavenderLairPinLockoutUntil";
const PIN_FAILURES_KEY = "lavenderLairPinFailures";

let pinEntry = "";
let firstPin = "";
let pinMode = localStorage.getItem(PIN_HASH_KEY) ? "unlock" : "create";
let lockoutTimer = null;

const pinLock = document.getElementById("pinLock");
const pinTitle = document.getElementById("pinTitle");
const pinSubtitle = document.getElementById("pinSubtitle");
const pinMessage = document.getElementById("pinMessage");
const pinHint = document.getElementById("pinHint");
const pinDots = Array.from(document.querySelectorAll(".pin-dot"));
const pinDigitButtons = Array.from(document.querySelectorAll("[data-digit]"));

async function hashPin(pin) {
  const bytes = new TextEncoder().encode(pin);
  const digest = await crypto.subtle.digest("SHA-256", bytes);
  return Array.from(new Uint8Array(digest))
    .map(byte => byte.toString(16).padStart(2, "0"))
    .join("");
}

function refreshPinDots() {
  pinDots.forEach((dot, index) => {
    dot.classList.toggle("filled", index < pinEntry.length);
  });
}

function clearPinEntry() {
  pinEntry = "";
  refreshPinDots();
}

function setPinMessage(message = "") {
  pinMessage.textContent = message;
}

function updatePinScreen() {
  clearPinEntry();
  setPinMessage("");

  if (pinMode === "create") {
    pinTitle.textContent = "Create Your PIN";
    pinSubtitle.textContent = "Choose a 4-digit PIN for this browser.";
    pinHint.textContent = "You will enter it again to confirm.";
  } else if (pinMode === "confirm") {
    pinTitle.textContent = "Confirm Your PIN";
    pinSubtitle.textContent = "Enter the same 4 digits one more time.";
    pinHint.textContent = "";
  } else {
    pinTitle.textContent = "Enter Your PIN";
    pinSubtitle.textContent = "Enter your 4-digit PIN to open the dashboard.";
    pinHint.textContent = "The PIN is stored only in this browser.";
  }
}

function unlockDashboard() {
  sessionStorage.setItem(PIN_UNLOCKED_KEY, "yes");
  pinLock.classList.add("hidden");
  document.body.classList.remove("locked");
  clearPinEntry();
}

function lockDashboard() {
  sessionStorage.removeItem(PIN_UNLOCKED_KEY);
  pinMode = localStorage.getItem(PIN_HASH_KEY) ? "unlock" : "create";
  updatePinScreen();
  pinLock.classList.remove("hidden");
  document.body.classList.add("locked");
}

function getLockoutRemaining() {
  const until = Number(localStorage.getItem(PIN_LOCKOUT_KEY) || 0);
  return Math.max(0, until - Date.now());
}

function beginLockoutCountdown() {
  if (lockoutTimer) clearInterval(lockoutTimer);

  const tick = () => {
    const remaining = getLockoutRemaining();

    if (remaining <= 0) {
      clearInterval(lockoutTimer);
      lockoutTimer = null;
      localStorage.removeItem(PIN_LOCKOUT_KEY);
      localStorage.setItem(PIN_FAILURES_KEY, "0");
      pinDigitButtons.forEach(button => button.disabled = false);
      document.getElementById("pinClear").disabled = false;
      document.getElementById("pinBack").disabled = false;
      setPinMessage("");
      return;
    }

    const seconds = Math.ceil(remaining / 1000);
    setPinMessage(`Too many incorrect attempts. Try again in ${seconds} seconds.`);
    pinDigitButtons.forEach(button => button.disabled = true);
    document.getElementById("pinClear").disabled = true;
    document.getElementById("pinBack").disabled = true;
  };

  tick();
  lockoutTimer = setInterval(tick, 250);
}

async function submitPin() {
  if (pinEntry.length !== 4) return;

  if (pinMode === "create") {
    firstPin = pinEntry;
    pinMode = "confirm";
    updatePinScreen();
    return;
  }

  if (pinMode === "confirm") {
    if (pinEntry !== firstPin) {
      pinMode = "create";
      firstPin = "";
      updatePinScreen();
      setPinMessage("Those PINs did not match. Please try again.");
      return;
    }

    localStorage.setItem(PIN_HASH_KEY, await hashPin(pinEntry));
    localStorage.setItem(PIN_FAILURES_KEY, "0");
    unlockDashboard();
    return;
  }

  const storedHash = localStorage.getItem(PIN_HASH_KEY);
  const enteredHash = await hashPin(pinEntry);

  if (enteredHash === storedHash) {
    localStorage.setItem(PIN_FAILURES_KEY, "0");
    unlockDashboard();
    return;
  }

  const failures = Number(localStorage.getItem(PIN_FAILURES_KEY) || 0) + 1;
  localStorage.setItem(PIN_FAILURES_KEY, String(failures));
  clearPinEntry();

  if (failures >= 5) {
    localStorage.setItem(PIN_LOCKOUT_KEY, String(Date.now() + 30000));
    beginLockoutCountdown();
  } else {
    setPinMessage(`Incorrect PIN. ${5 - failures} attempt${5 - failures === 1 ? "" : "s"} remaining.`);
  }
}

function addPinDigit(digit) {
  if (getLockoutRemaining() > 0 || pinEntry.length >= 4) return;
  pinEntry += digit;
  refreshPinDots();

  if (pinEntry.length === 4) {
    setTimeout(submitPin, 120);
  }
}

pinDigitButtons.forEach(button => {
  button.addEventListener("click", () => addPinDigit(button.dataset.digit));
});

document.getElementById("pinClear").addEventListener("click", clearPinEntry);

document.getElementById("pinBack").addEventListener("click", () => {
  pinEntry = pinEntry.slice(0, -1);
  refreshPinDots();
});

document.getElementById("lockAgain").addEventListener("click", lockDashboard);

document.addEventListener("keydown", event => {
  if (pinLock.classList.contains("hidden")) return;

  if (/^\d$/.test(event.key)) addPinDigit(event.key);
  if (event.key === "Backspace") {
    pinEntry = pinEntry.slice(0, -1);
    refreshPinDots();
  }
  if (event.key === "Escape") clearPinEntry();
});

if (sessionStorage.getItem(PIN_UNLOCKED_KEY) === "yes" && localStorage.getItem(PIN_HASH_KEY)) {
  unlockDashboard();
} else {
  updatePinScreen();
  if (getLockoutRemaining() > 0) beginLockoutCountdown();
}

updateDashboard();
</script>
